name: Set up the Aleo devnode toolchain
description: Installs pnpm + Node, the repo deps, and the pinned leo + aleo-devnode binaries.

inputs:
  leo-release:
    description: leo release tag (e.g. leo-lang-v4.3.2)
    required: true
  devnode-release:
    description: aleo-devnode release tag (e.g. v0.2.0)
    required: true

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    - name: Cache Aleo toolchain
      id: toolchain
      uses: actions/cache@v4
      with:
        path: ~/.aleo-tools
        key: aleo-tools-${{ inputs.leo-release }}-${{ inputs.devnode-release }}
    - name: Install leo and aleo-devnode
      if: steps.toolchain.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.aleo-tools
        curl -fsSL -o /tmp/leo.zip \
          "https://github.com/ProvableHQ/leo/releases/download/${{ inputs.leo-release }}/${{ inputs.leo-release }}-x86_64-unknown-linux-gnu.zip"
        unzip -o /tmp/leo.zip -d ~/.aleo-tools
        curl -fsSL -o /tmp/devnode.zip \
          "https://github.com/ProvableHQ/aleo-devnode/releases/download/${{ inputs.devnode-release }}/aleo-devnode-${{ inputs.devnode-release }}-x86_64-unknown-linux-gnu.zip"
        unzip -o /tmp/devnode.zip -d ~/.aleo-tools
        chmod +x ~/.aleo-tools/leo ~/.aleo-tools/aleo-devnode
    - name: Add toolchain to PATH
      shell: bash
      run: echo "$HOME/.aleo-tools" >> "$GITHUB_PATH"
    - name: Toolchain versions
      shell: bash
      run: |
        leo --version
        aleo-devnode --version
