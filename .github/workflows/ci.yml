name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LEO_RELEASE: leo-lang-v4.3.2
  DEVNODE_RELEASE: v0.2.0

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit and example tests
        run: pnpm vitest run
      - name: Typecheck reference dApp
        run: pnpm --filter @provablehq/veil-loyalty-dapp exec tsc --noEmit

  # Core devnode plumbing (deploy / execute / records / snapshots / codegen).
  devnode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VEIL_DEVNODE_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-devnode
        with:
          leo-release: ${{ env.LEO_RELEASE }}
          devnode-release: ${{ env.DEVNODE_RELEASE }}
      # Every devnode suite binds 127.0.0.1:3030 — run the files strictly
      # sequentially so two devnodes never race for the port.
      - name: Devnode e2e tests
        run: >
          pnpm vitest run --no-file-parallelism
          packages/devnode/test/devnodeActions.integration.test.ts
          packages/provable-sdk/test/integration/devnodeE2e.test.ts
          packages/provable-sdk/test/integration/devnodeWrite.e2e.test.ts
          packages/codegen/test/integration/creditsDevnode.e2e.test.ts

  # Shield Swap AMM v3 lifecycle — heavier (deploys the ~240KB AMM), so it runs
  # as its own job, in parallel with the core devnode job on a separate runner.
  devnode-shield-swap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VEIL_DEVNODE_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-devnode
        with:
          leo-release: ${{ env.LEO_RELEASE }}
          devnode-release: ${{ env.DEVNODE_RELEASE }}
      - name: Shield Swap AMM lifecycle e2e
        run: >
          pnpm vitest run --no-file-parallelism
          packages/shield-swap/test/integration/devnodeLifecycle.actions.e2e.test.ts
          packages/shield-swap/test/integration/devnodeLifecycle.generated.e2e.test.ts
